ev_grid:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      private_key_path: "{{ env_var('SNOWFLAKE_PRIVATE_KEY_ABS_PATH') }}"
      warehouse: EV_WH
      database: EV_GRID
      schema: ANALYTICS
      threads: 4
